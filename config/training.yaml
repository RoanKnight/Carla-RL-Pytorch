phase: 1
name: "Learning basic driving skills on progressively harder opt maps and weather"

# Training configuration
training:
  total_timesteps: 6000000
  eval_freq: 100000
  log_interval: 1

# Episode configuration
episode:
  max_steps: 5000

# Map randomization frequency in episodes
map_randomization:
  train_map_randomness_frequency: 40
  test_map_randomness_frequency: 2

# SAC hyperparameters
sac:
  learning_rate: 0.0001
  buffer_size: 100000
  batch_size: 256
  gamma: 0.99
  tau: 0.002
  ent_coef: auto
  train_freq: 1
  gradient_steps: 1
  learning_starts: 50000

# Logging configuration
logging:
  checkpoint_dir: checkpoints

# Curriculum schedule
curriculum:
  episode_length:
    - timesteps: 0
      max_steps: 1500
    - timesteps: 250000
      max_steps: 4000
    - timesteps: 500000
      max_steps: 6000
    - timesteps: 1000000
      max_steps: 8000
  maps:
    - timesteps: 0
      choices: [Town01_Opt, Town02_Opt, Town07_Opt]
  weathers:
    - timesteps: 0
      choices: [clear_noon, clear_sunset]
    - timesteps: 750000
      choices: [clear_noon, clear_sunset, cloudy_noon, cloudy_sunset]
    - timesteps: 1500000
      choices: [clear_noon, clear_sunset, cloudy_noon, cloudy_sunset, rainy_noon, rainy_sunset]
    - timesteps: 2500000
      choices: [clear_noon, clear_sunset, cloudy_noon, cloudy_sunset, rainy_noon, rainy_sunset, heavy_rain_noon, heavy_rain_sunset, foggy_noon, foggy_sunset]
  traffic_lights:
    - timesteps: 0
      enabled: false

# Reward weights
reward_weights:
  waypoint_progress: 4.0
  target_speed_compliance: 0.03
  lane_deviation: 0.3
  smoothness_steer: 0.70
  smoothness_accel_brake: 0.60
  collision: 100.0
  success: 100.0
  traffic_light_violation: 50.0

# Speed-limit-based driving targets
speed_limit:
  target_fraction: 0.90
  red_light_ramp_m_per_kmh: 1.25

# Camera augmentation (DrQ)
augmentation:
  drq_enabled: false
  drq_pad: 4