description: "Unified SAC CARLA training configuration with curriculum scheduling for progressive complexity"

# Training configuration
training:
  total_timesteps: 6000000
  eval_freq: 50000
  log_interval: 4

# Map randomization frequency in episodes
map_randomization:
  train_map_randomness_frequency: 20
  test_map_randomness_frequency: 1

# SAC hyperparameters
sac:
  learning_rate: 0.0003
  buffer_size: 100000
  batch_size: 256 
  gamma: 0.99
  tau: 0.005
  ent_coef: auto
  train_freq: 1
  gradient_steps: 1
  learning_starts: 20000

# DrQ augmentation settings (applies to image_front only)
drq:
  pad: 4
  cnn_output_dim: 256

# Logging configuration
logging:
  checkpoint_dir: checkpoints

# Curriculum configurations: progressive difficulty over training
curriculum:
  episode_length:
    - timesteps: 0
      max_steps: 1500
    - timesteps: 100000
      max_steps: 2500
    - timesteps: 1000000
      max_steps: 3500
    - timesteps: 2000000
      max_steps: 5000

  maps:
    - timesteps: 0
      choices: [Town01_Opt, Town02_Opt]
    - timesteps: 500000
      choices: [Town01_Opt, Town02_Opt, Town03_Opt]
    - timesteps: 1500000
      choices: [Town01_Opt, Town02_Opt, Town03_Opt, Town04_Opt]
    - timesteps: 3000000
      choices: [Town01_Opt, Town02_Opt, Town03_Opt, Town04_Opt, Town05_Opt]
    - timesteps: 4500000
      choices: [Town01_Opt, Town02_Opt, Town03_Opt, Town04_Opt, Town05_Opt, Town10HD_Opt]

  weathers:
    - timesteps: 0
      choices: [clear_noon, clear_sunset]
    - timesteps: 500000
      choices: [clear_noon, clear_sunset, cloudy_noon, cloudy_sunset]
    - timesteps: 1500000
      choices: [clear_noon, clear_sunset, cloudy_noon, cloudy_sunset, rainy_noon, rainy_sunset]
    - timesteps: 2500000
      choices: [clear_noon, clear_sunset, cloudy_noon, cloudy_sunset, rainy_noon, rainy_sunset, heavy_rain_noon, heavy_rain_sunset]
    - timesteps: 4000000
      choices: [clear_noon, clear_sunset, cloudy_noon, cloudy_sunset, rainy_noon, rainy_sunset, heavy_rain_noon, heavy_rain_sunset, foggy_noon, foggy_sunset]

  drq:
    - timesteps: 0
      enabled: true

# Reward weights
reward_weights:
  waypoint_progress: 1.0 
  waypoint_reached: 10.0 
  speed_bonus: 0.2       
  speed_penalty: 0.02  
  lane_deviation: 0.2   
  off_road: 3.0 
  lane_invasion: 25.0
  collision: 100.0
  steering_smoothness: 0.4
  throttle_brake_smoothness: 0.2
  success: 200.0
  traffic_light_compliance: 0.5
  red_light_violation: 100.0
  holding_at_red: 0.5

# Minimum speed as a fraction of the road speed limit (0.5 = must drive at least 50% of limit)
min_speed_fraction: 0.5
