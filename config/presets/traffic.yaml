# Traffic presets for CARLA environment for random traffic selection each episode
# global_speed_difference: % slower than speed limit (30 = 70% of limit, 0 = full speed)
# distance_to_leading_vehicle: minimum following distance in meters
presets:
  none:
    num_vehicles: 0
    num_walkers: 0

  minimal:
    num_vehicles: 15
    num_walkers: 5
    global_speed_difference: 30.0
    distance_to_leading_vehicle: 3.0

  moderate:
    num_vehicles: 40
    num_walkers: 15
    global_speed_difference: 20.0
    distance_to_leading_vehicle: 2.5

  high:
    num_vehicles: 80
    num_walkers: 30
    global_speed_difference: 10.0
    distance_to_leading_vehicle: 2.0

  extra_high:
    num_vehicles: 120
    num_walkers: 50
    global_speed_difference: 0.0
    distance_to_leading_vehicle: 1.5
