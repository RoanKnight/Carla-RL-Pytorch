# CARLA client configuration
carla:
  host: localhost
  port: 2000
  timeout: 30.0

# Vehicle configuration
vehicle:
  model: vehicle.tesla.model3

# Observation configuration for RGB sensor for RL
observation:
  width: 84
  height: 84
  fov: 90

lane_detection:
  max_lane_deviation: 5.0

control:
  max_forward_speed: 90.0
  speed_tolerance: 1.0
  proportional_gain: 0.3

# Spectator camera configuration for test visualization
camera:
  distance_behind: 6.0
  height_above: 2.0
